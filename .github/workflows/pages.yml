name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build project for GitHub Pages
        env:
          # AWS Lightsail backend. VITE_* vars are baked in at build time, so a
          # backend URL change requires a rebuild here, not just a redeploy.
          VITE_API_BASE_URL: https://forex-dashboard.8xy5d1tats0s8.us-east-1.cs.amazonlightsail.com
          VITE_BASE_PATH: /Forex-Session-Dashboard/
        run: npm run build

      - name: Fail if the dead Cloud Run URL is still in the bundle
        run: |
          if grep -rq "run\.app" dist/; then
            echo "::error::Built bundle still references a Cloud Run URL — the API base did not get rewritten."
            grep -ro "https://[a-z0-9.-]*run\.app" dist/ | sort -u
            exit 1
          fi
          echo "OK: no Cloud Run references in dist/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
